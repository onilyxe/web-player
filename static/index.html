<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d" id="theme-color-meta">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<!-- PWA / iOS standalone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Web - player">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Web - player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Preload variable font for instant text -->
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500..700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500..700&display=swap">
<style>
  /* ===== Theme tokens (dark only — adaptive palette overrides at runtime) ===== */
  :root {
    --page-bg: #0b0b0d;
    --page-bg-secondary: #16161a;

    /* Bubble overlay — subtle tint over cover for legibility */
    --col-overlay: rgba(8,8,12,0.10);
    --col-overlay-active: rgba(8,8,12,0.10);

    --text: #ffffff;
    --text-2: #e4e4e8;
    --text-3: #a8a8ae;
    --text-ghost: rgba(255,255,255,0.42);

    --accent: #f5a868;
    --accent-active: #ffba7a;
    --accent-soft: rgba(245,168,104,0.18);
    --accent-ink: #1a1008;

    --surface: rgba(20,20,24,0.65);
    --surface-elevated: rgba(28,28,34,0.95);
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --shadow-card: 0 10px 30px rgba(0,0,0,0.55);

    --text-shadow-soft: 0 1px 2px rgba(0,0,0,0.85), 0 0 16px rgba(0,0,0,0.55);
    --text-shadow-active: 0 2px 4px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.7);

    --cover-filter: blur(14px) brightness(0.88) saturate(1.25);
    --cover-filter-wide: blur(8px) brightness(0.92) saturate(1.3);

    /* Single blob composed from these three colors via radial-gradient */
    --blob-1: #f5a868; --blob-2: #8b5dbf; --blob-3: #4a90a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Respect users who request reduced motion (iOS Settings > Accessibility > Motion).
     Kills non-essential animations and transitions — users still see state changes
     but without drawn-out easing that can feel like lag on slower devices. */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* iOS PWA: bg layers must extend physically under notch and home indicator,
     while content (body) stays inside safe zones via padding.
     The `inset: -1px` + viewport units on bg-cover/bg-gradient puts them BELOW body's
     safe-area padding visually, so the cover image is visible everywhere on screen. */
  html {
    height: 100%;
    background: var(--page-bg);
  }

  body {
    /* Use largest viewport height (visible+safe areas in iOS PWA) */
    height: 100vh;
    height: 100dvh;
    background: transparent; /* show bg-cover/bg-gradient through */
    color: var(--text);
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    transition: color 0.5s ease;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  input[type="file"] { display: none; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }

  /* ===== Background layers — extend under safe areas in iOS PWA ===== */
  .bg-cover {
    position: fixed;
    /* Cover entire physical screen including notch/home indicator.
       100lvh = "largest viewport height" (iOS 15.4+, includes safe areas). */
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    height: 100lvh;
    background-size: cover;
    background-position: center;
    filter: var(--cover-filter);
    -webkit-filter: var(--cover-filter);
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 0;
    transform: translateZ(0);
  }
  .bg-cover.active { opacity: 1; }

  @media (min-aspect-ratio: 10/16) {
    .bg-cover {
      filter: var(--cover-filter-wide);
      -webkit-filter: var(--cover-filter-wide);
    }
  }

  .bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    height: 100lvh;
    overflow: hidden;
    opacity: 1;
    transition: opacity 0.6s ease;
    z-index: 0;
    background: radial-gradient(ellipse at top, var(--page-bg-secondary), var(--page-bg) 70%);
  }
  .bg-gradient.hidden { opacity: 0; pointer-events: none; }

  /* When cover is active, completely remove blob from compositing */
  .bg-gradient.hidden .blob { display: none; }

  /* Single blob: cheap soft color wash. Replaced 3 separate blobs to save GPU work. */
  .blob {
    position: absolute;
    width: 80%;
    height: 80%;
    top: -10%;
    left: -10%;
    border-radius: 50%;
    filter: blur(40px);
    -webkit-filter: blur(40px);
    opacity: 0.55;
    background: radial-gradient(circle at 30% 40%, var(--blob-1) 0%, var(--blob-2) 50%, var(--blob-3) 100%);
    animation: drift 40s ease-in-out infinite alternate;
    will-change: transform;
  }

  @keyframes drift {
    0%   { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(15%, 10%, 0) scale(1.08); }
  }

  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none !important; }
  }

  /* ===== Page layout ===== */
  .page {
    height: 100%;
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
  }

  /* ===== Top chrome (over column on mobile) ===== */
  .top-chrome {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 8px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 20;
  }

  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text-2);
    height: 40px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 14px;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .icon-btn.square { width: 40px; padding: 0; }
  .icon-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .icon-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .icon-btn:active { transform: scale(0.94); }

  /* ===== Column: central content area ===== */
  .column-wrap {
    flex: 1;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 0 16px 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    min-height: 0;
  }

  .column {
    width: 100%;
    max-width: 560px;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* Bubble overlay — ALWAYS visible (covers entire column height including controls area) */
  .column-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: var(--col-overlay);
    opacity: 1;
    transition: background 0.5s ease;
    border-radius: 24px;
  }
  /* When cover is active, bubble has slightly stronger overlay for legibility */
  .column-bg.active {
    background: var(--col-overlay-active);
  }

  .column-content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ===== Dropzone ===== */
  .dropzone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 32px;
    cursor: pointer;
    text-align: center;
    transition: opacity 0.3s;
  }
  .dropzone.dragover { opacity: 0.85; }

  .dropzone-icon {
    width: 88px;
    height: 88px;
    border: 1.5px dashed var(--border-strong);
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 300;
    color: var(--text-2);
    transition-property: color, border-color, background, transform;
    transition-duration: 0.3s;
    transition-timing-function: cubic-bezier(0.2, 0, 0, 1);
  }
  .dropzone:hover .dropzone-icon, .dropzone.dragover .dropzone-icon {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: scale(1.04);
  }

  .dropzone-title {
    font-size: 26px; font-weight: 700;
    color: var(--text); letter-spacing: -0.02em;
    text-shadow: var(--text-shadow-soft);
  }
  .dropzone-sub {
    font-size: 14px; font-weight: 600;
    color: var(--text-2); text-shadow: var(--text-shadow-soft);
  }
  .dropzone-formats {
    font-size: 11px; font-weight: 700;
    color: var(--text-3); letter-spacing: 0.18em;
    text-shadow: var(--text-shadow-soft);
  }

  /* ===== Player view ===== */
  .player-view { display: none; flex-direction: column; height: 100%; }
  .player-view.active { display: flex; }

  .lyrics-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
  }

  .lyrics {
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    padding: 45% 22px;
    scrollbar-width: none;
  }
  .lyrics::-webkit-scrollbar { display: none; }

  /* Lyric lines */
  .lyric-line {
    font-size: 24px;
    line-height: 1.4;
    letter-spacing: -0.01em;
    font-weight: 500;
    font-variation-settings: 'wght' 500;
    color: var(--text-2);
    padding: 10px 0;
    cursor: pointer;
    text-align: center;
    text-shadow: var(--text-shadow-soft);
    /* Animate only color+shadow. Font weight changes instantly (GPU-free). */
    transition: color 0.3s ease, text-shadow 0.3s ease;
    font-synthesis: none;
    font-kerning: none;
    text-rendering: geometricPrecision;
    contain-intrinsic-size: auto 50px;
    position: relative;
  }

  /* Invisible bold "ghost" — reserves width for active state, prevents wrap reflow */
  .lyric-line::before {
    content: attr(data-text);
    display: block;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    visibility: hidden;
    pointer-events: none;
    height: 0;
    overflow: hidden;
    letter-spacing: -0.01em;
    line-height: 1.4;
  }

  .lyric-line:hover { color: var(--text); }

  .lyric-line.past {
    color: var(--text-2);
    font-variation-settings: 'wght' 500;
  }
  .lyric-line.active {
    color: var(--text);
    font-variation-settings: 'wght' 700;
    text-shadow: var(--text-shadow-active);
  }
  .lyric-line.future {
    color: var(--text-3);
    font-variation-settings: 'wght' 500;
  }
  .lyric-line.empty {
    padding: 8px 0;
    opacity: 0.5;
  }
  .lyric-line.empty::before { content: ''; }
  .lyric-line.empty::after {
    content: '•';
    color: var(--text-ghost);
    font-size: 14px;
  }

  .lyrics.plain { padding: 45% 22px; }
  .lyrics.plain .lyric-line {
    font-size: 17px;
    font-weight: 500;
    font-variation-settings: 'wght' 500;
    color: var(--text);
    cursor: default;
    padding: 3px 0;
    text-align: center;
  }
  .lyrics.plain .lyric-line::before { content: ''; }

  .no-lyrics {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px;
    text-align: center;
  }
  .no-lyrics-title {
    font-size: 32px;
    font-weight: 700;
    color: var(--text-2);
    letter-spacing: -0.03em;
    text-shadow: var(--text-shadow-soft);
  }
  .no-lyrics-sub {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-3);
    letter-spacing: 0.15em;
    text-shadow: var(--text-shadow-soft);
  }

  /* ===== Bottom strip + controls ===== */
  .bottom-area {
    flex-shrink: 0;
    padding: 8px 16px 6px;
  }

  .strip-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .mini-art {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: transparent;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  /* Show subtle bg only when image absent (placeholder mode) */
  .mini-art:has(.placeholder) {
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .mini-art img { width: 100%; height: 100%; object-fit: cover; }
  .mini-art .placeholder {
    color: var(--text-3);
    font-size: 24px;
    font-weight: 300;
  }

  .mini-info { flex: 1; min-width: 0; }
  .mini-title {
    font-size: 15px;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    color: var(--text);
    line-height: 1.25;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mini-artist {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text-2);
    margin-bottom: 10px;
  }

  .seek {
    flex: 1;
    height: 4px;
    background: var(--seek-bg, rgba(255,255,255,0.25));
    cursor: pointer;
    position: relative;
    border-radius: 999px;
    transition: height 0.2s, background 0.4s ease;
  }
  .seek:hover { height: 6px; }
  .seek-progress {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: var(--accent);
    width: 0%;
    border-radius: 999px;
    pointer-events: none;
    transition: width 0.1s linear;
  }
  .seek-progress::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .seek:hover .seek-progress::after { opacity: 1; }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .ctrl-btn {
    background: transparent;
    border: none;
    color: var(--text-2);
    width: 44px;
    height: 44px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, background 0.2s, transform 0.15s;
    padding: 0;
    flex-shrink: 0;
  }
  .ctrl-btn:hover { color: var(--text); background: var(--surface); }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }

  .ctrl-btn.toggle.on {
    color: var(--accent);
    background: var(--accent-soft);
  }

  .ctrl-btn.disabled {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* When a local drag-n-drop file is loaded, hide library navigation controls */
  body.local-mode .ctrl-btn.lib-only {
    display: none;
  }

  .play-btn {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: var(--accent-ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), background 0.2s;
    flex-shrink: 0;
    padding: 0;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }
  .play-btn:hover { transform: scale(1.06); background: var(--accent-active); }
  .play-btn:active { transform: scale(0.94); }
  .play-btn svg { width: 22px; height: 22px; fill: currentColor; }

  /* ===== Toast — above modal ===== */
  .toast {
    position: fixed;
    bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    background: var(--surface-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    z-index: 400;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    border-radius: 999px;
    box-shadow: var(--shadow-card);
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: rgba(255, 120, 100, 0.4); }

  /* ===== Admin modal ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-backdrop.active { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--surface-elevated);
    border: 1px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 440px;
    max-height: 85dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transform: translateY(16px);
    transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
  }
  .modal-backdrop.active .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px 12px;
    flex-shrink: 0;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-2);
    width: 32px;
    height: 32px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }
  .modal-close svg { width: 18px; height: 18px; }

  .modal-body { padding: 4px 22px 22px; flex-shrink: 0; }

  .input {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    transition: border-color 0.2s;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text-3); }

  .btn-primary {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s, background 0.2s;
  }
  .btn-primary:hover { transform: translateY(-1px); background: var(--accent-active); }
  .btn-primary:active { transform: translateY(0) scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }

  .tracks-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 4px 10px 10px;
    min-height: 0;
  }

  .track-row {
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .track-row:hover { background: var(--border); }
  .track-row:active { background: var(--accent-soft); }
  .track-row.playing { background: var(--accent-soft); }
  .track-row.playing .track-row-name { color: var(--accent); }

  .track-row-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .track-row-size {
    font-size: 11px;
    color: var(--text-3);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    font-weight: 600;
  }

  .tracks-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-3);
    font-size: 14px;
    font-weight: 500;
  }

  .search-wrap { padding: 4px 22px 12px; flex-shrink: 0; }

  /* ===== Responsive ===== */
  @media (max-height: 620px) {
    .lyric-line { font-size: 19px; padding: 8px 0; }
    .mini-art { width: 44px; height: 44px; border-radius: 10px; }
    .play-btn { width: 48px; height: 48px; }
    .ctrl-btn { width: 38px; height: 38px; }
    .ctrl-btn svg { width: 20px; height: 20px; }
  }

  /* Mobile: full-bleed bubble extending to all 4 edges; chrome and controls float inside */
  @media (max-width: 640px) {
    .page {
      position: relative;
    }
    .top-chrome {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
    }
    .column-wrap {
      padding: 0;
      /* No safe-area padding here — bubble must go all the way to bottom edge */
    }
    .column { max-width: 100%; }
    .column-bg {
      border-radius: 0;

    .lyrics {
      padding-left: 22px;
      padding-right: 22px;
      /* Reserve space at top so first lines aren't under chrome buttons */
      padding-top: calc(45% + env(safe-area-inset-top, 0px));
      /* Symmetric bottom so last lines have breathing room above controls */
      padding-bottom: 45%;
    }
    .bottom-area {
      padding-left: 18px;
      padding-right: 18px;
      /* Push controls above home indicator / Safari bottom bar */
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    }
    .lyric-line { font-size: 23px; }
    .top-chrome { padding-left: 12px; padding-right: 12px; }
  }

  @media (max-width: 400px) {
    .lyric-line { font-size: 21px; }
    .icon-btn { padding: 0 12px; font-size: 12px; }
    .icon-btn .label { display: none; }
    .icon-btn.square { width: 40px; padding: 0; }
  }
</style>
</head>

<input type="file" id="file-input" accept=".flac,.mp3,.m4a,.mp4,.ogg,.opus,audio/*">
<audio id="audio" preload="metadata" crossorigin="anonymous"></audio>
<div class="toast" id="toast"></div>

<script>
"use strict";

const ALLOWED_EXT = new Set(['flac', 'mp3', 'm4a', 'mp4', 'ogg', 'opus']);
const MAX_FILE_SIZE = 500 * 1024 * 1024;
const MAGIC_SIGS = [
  { bytes: [0x66, 0x4C, 0x61, 0x43] },
  { bytes: [0x49, 0x44, 0x33] },
  { bytes: [0xFF, 0xFB], mask: [0xFF, 0xFE] },
  { bytes: [0xFF, 0xF3], mask: [0xFF, 0xFE] },
  { bytes: [0x4F, 0x67, 0x67, 0x53] },
];

const state = {
  // Lyrics + sync
  lines: [],
  currentIdx: -1,
  isLRC: false,
  suppressSync: false,    // true during track switch — blocks updateActiveLyric
  scrollAnimToken: 0,     // increments on each scroll animation; in-flight ones bail if mismatched

  // Playback / source
  currentBlobUrl: null,   // URL.createObjectURL for drag-n-drop, revoked on next load
  srcToken: 0,            // increments on each setSource — invalidates async callbacks
  adaptiveIsLight: null,  // true/false/null — used for color hysteresis

  // Library state
  allTracks: [],
  filteredTracks: [],
  currentTrack: null,
  currentTrackIdx: -1,
  shuffleQueue: [],
  shufflePast: [],

  // Auth
  adminToken: null,

  // User toggles (mirrored to localStorage)
  shuffleOn: false,
  autoplayOn: false,
};

const $ = id => document.getElementById(id);
const el = {
  dropzone: $('dropzone'), fileInput: $('file-input'), playerView: $('player-view'),
  loadNewBtn: $('load-new-btn'),
  adminBtn: $('admin-btn'), adminModal: $('admin-modal'), adminClose: $('admin-close'),
  adminLogin: $('admin-login'), adminTracks: $('admin-tracks'), adminTitle: $('admin-title'),
  adminPassword: $('admin-password'), adminSubmit: $('admin-submit'),
  adminSearch: $('admin-search'), tracksList: $('tracks-list'),
  bgCover: $('bg-cover'), bgGradient: $('bg-gradient'),
  columnBg: $('column-bg'),
  miniArt: $('mini-art'), miniTitle: $('mini-title'), miniArtist: $('mini-artist'),
  lyrics: $('lyrics'),
  playBtn: $('play-btn'), playIcon: $('play-icon'),
  prevBtn: $('prev-btn'), nextBtn: $('next-btn'),
  shuffleBtn: $('shuffle-btn'), autoplayBtn: $('autoplay-btn'),
  timeCurrent: $('time-current'), timeTotal: $('time-total'),
  seek: $('seek'), seekProgress: $('seek-progress'),
  audio: $('audio'), toast: $('toast'),
};

// ===== Toggles =====
function loadToggles() {
  try {
    state.shuffleOn = localStorage.getItem('shuffle') === '1';
    state.autoplayOn = localStorage.getItem('autoplay') === '1';
  } catch {}
  el.shuffleBtn.classList.toggle('on', state.shuffleOn);
  el.autoplayBtn.classList.toggle('on', state.autoplayOn);
}
loadToggles();

el.shuffleBtn.addEventListener('click', () => {
  state.shuffleOn = !state.shuffleOn;
  el.shuffleBtn.classList.toggle('on', state.shuffleOn);
  try { localStorage.setItem('shuffle', state.shuffleOn ? '1' : '0'); } catch {}
  state.shuffleQueue = [];
  toast(state.shuffleOn ? 'Перемішати: увімкнено' : 'Перемішати: вимкнено');
});

el.autoplayBtn.addEventListener('click', () => {
  state.autoplayOn = !state.autoplayOn;
  el.autoplayBtn.classList.toggle('on', state.autoplayOn);
  try { localStorage.setItem('autoplay', state.autoplayOn ? '1' : '0'); } catch {}
  toast(state.autoplayOn ? 'Автоплей: увімкнено' : 'Автоплей: вимкнено');
});

// ===== File validation =====
function getExt(name) {
  const i = name.lastIndexOf('.');
  return i < 0 ? '' : name.substring(i + 1).toLowerCase();
}

async function validateFile(file) {
  const ext = getExt(file.name);
  if (!ALLOWED_EXT.has(ext)) {
    toast('Формат не підтримується: .' + (ext || '?'), true);
    return false;
  }
  if (file.size > MAX_FILE_SIZE) { toast('Файл завеликий (>500 MB)', true); return false; }
  if (file.size < 128) { toast('Файл занадто малий', true); return false; }
  try {
    const head = new Uint8Array(await file.slice(0, 16).arrayBuffer());
    if (head[4] === 0x66 && head[5] === 0x74 && head[6] === 0x79 && head[7] === 0x70) return true;
    for (const sig of MAGIC_SIGS) {
      let ok = true;
      for (let i = 0; i < sig.bytes.length; i++) {
        const mask = sig.mask ? sig.mask[i] : 0xFF;
        if ((head[i] & mask) !== (sig.bytes[i] & mask)) { ok = false; break; }
      }
      if (ok) return true;
    }
    return true;
  } catch { return false; }
}

// ===== File handling =====
['dragenter', 'dragover'].forEach(ev =>
  el.dropzone.addEventListener(ev, e => { e.preventDefault(); el.dropzone.classList.add('dragover'); }));
['dragleave', 'drop'].forEach(ev =>
  el.dropzone.addEventListener(ev, e => { e.preventDefault(); el.dropzone.classList.remove('dragover'); }));

el.dropzone.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) loadLocalFile(f);
});
el.fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadLocalFile(f);
  e.target.value = '';
});
el.loadNewBtn.addEventListener('click', () => el.fileInput.click());

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  if (el.playerView.classList.contains('active')) {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f) loadLocalFile(f);
  }
});

async function loadLocalFile(file) {
  if (!(await validateFile(file))) return;
  const myToken = ++state.srcToken;
  state.currentTrack = null;
  state.currentTrackIdx = -1;
  updateNavControls();
  try {
    const buffer = await file.arrayBuffer();
    if (myToken !== state.srcToken) return;
    const tag = parseTags(buffer);
    const url = URL.createObjectURL(file);
    await setSource(url, tag, { name: file.name, size: file.size }, myToken, true);
  } catch (err) {
    console.error('Load error:', err);
    toast('Не вдалося завантажити файл', true);
  }
}

async function loadRemoteTrack(track) {
  const token = state.adminToken;
  if (!token) { toast('Немає токена', true); return; }

  state.currentTrack = track;
  state.currentTrackIdx = state.filteredTracks.findIndex(t => t.id === track.id);
  updateNavControls();
  highlightPlayingRow();

  const url = `/api/track/${track.id.split('/').map(encodeURIComponent).join('/')}?token=${encodeURIComponent(token)}`;
  const myToken = ++state.srcToken;

  let tag = { tags: {}, picture: null, type: 'unknown' };
  try {
    const resp = await fetch(url, { headers: { 'Range': 'bytes=0-2097151' } });
    if (!resp.ok && resp.status !== 206 && resp.status !== 200) {
      if (resp.status === 401) {
        state.adminToken = null;
        try { localStorage.removeItem('adminToken'); } catch {}
        toast('Сесія закінчилась. Увійди знову.', true);
      } else {
        toast('Помилка: ' + resp.status, true);
      }
      return;
    }
    if (myToken !== state.srcToken) return;
    const buf = await resp.arrayBuffer();
    try { tag = parseTags(buf); } catch (e) { console.warn('Tag parse failed:', e); }
  } catch (err) {
    console.error(err);
    toast('Мережа недоступна', true);
    return;
  }
  if (myToken !== state.srcToken) return;

  await setSource(url, tag, { name: track.name, size: track.size || 0 }, myToken, false);
  closeAdminModal();
}

async function setSource(url, tag, meta, myToken, isLocal) {
  try { el.audio.pause(); } catch {}

  // CRITICAL: suppress timeupdate-driven scrolling until the new src is fully loaded.
  // Otherwise iOS Safari can fire a stale timeupdate from the OLD src, which triggers
  // updateActiveLyric on the NEW lyrics list and scrolls to a random (often last) line.
  state.suppressSync = true;

  if (state.currentBlobUrl && state.currentBlobUrl !== url) {
    URL.revokeObjectURL(state.currentBlobUrl);
    state.currentBlobUrl = null;
  }
  if (isLocal) state.currentBlobUrl = url;

  state.currentIdx = -1;
  state.lines = [];

  renderTrack(tag, meta);
  showPlayer();

  el.audio.src = url;
  try { el.audio.load(); } catch {}

  const playWhenReady = () => {
    if (myToken !== state.srcToken) return;
    // NOW it's safe to reset currentTime — src is loaded
    try { el.audio.currentTime = 0; } catch {}
    // Hammer scrollTop=0 again now that audio is ready (defeats iOS scroll restoration)
    forceScrollTop();
    // Re-enable sync
    state.suppressSync = false;
    const p = el.audio.play();
    if (p && typeof p.catch === 'function') p.catch(err => {
      if (err && err.name !== 'AbortError') console.warn('play() rejected:', err);
    });
  };
  const onCanPlay = () => { cleanup(); playWhenReady(); };
  const onError = () => { cleanup(); state.suppressSync = false; toast('Не вдалося програти', true); };
  const cleanup = () => {
    el.audio.removeEventListener('canplay', onCanPlay);
    el.audio.removeEventListener('error', onError);
  };
  el.audio.addEventListener('canplay', onCanPlay, { once: true });
  el.audio.addEventListener('error', onError, { once: true });
  // Safety net: if canplay never fires, unlock sync after 15s anyway
  setTimeout(() => { cleanup(); state.suppressSync = false; }, 15000);
}

// ===== Navigation =====
function updateNavControls() {
  const hasLib = state.currentTrack && state.filteredTracks.length > 0;
  el.prevBtn.classList.toggle('disabled', !hasLib);
  el.nextBtn.classList.toggle('disabled', !hasLib);
  // Hide library-only controls (shuffle/prev/next/autoplay) for local drag-n-drop files.
  // Local mode = no current track from library (drag-n-drop or initial state).
  document.body.classList.toggle('local-mode', !state.currentTrack);
}

function pickNextShuffle() {
  if (state.shuffleQueue.length === 0) {
    const pool = state.filteredTracks
      .filter(t => !state.currentTrack || t.id !== state.currentTrack.id)
      .slice();
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    state.shuffleQueue = pool.map(t => t.id);
  }
  const nextId = state.shuffleQueue.shift();
  return state.filteredTracks.find(t => t.id === nextId);
}

function playNext() {
  if (!state.filteredTracks.length) return;
  if (state.shuffleOn) {
    if (state.currentTrack) state.shufflePast.push(state.currentTrack.id);
    if (state.shufflePast.length > 50) state.shufflePast.shift();
    const next = pickNextShuffle();
    if (next) loadRemoteTrack(next);
    return;
  }
  let idx = state.currentTrackIdx;
  if (idx < 0) idx = -1;
  idx = (idx + 1) % state.filteredTracks.length;
  loadRemoteTrack(state.filteredTracks[idx]);
}

function playPrev() {
  if (!state.filteredTracks.length) return;
  if (el.audio.currentTime > 3 && !el.audio.paused) {
    el.audio.currentTime = 0;
    return;
  }
  if (state.shuffleOn) {
    const prevId = state.shufflePast.pop();
    if (prevId) {
      const t = state.filteredTracks.find(x => x.id === prevId);
      if (t) { loadRemoteTrack(t); return; }
    }
    const next = pickNextShuffle();
    if (next) loadRemoteTrack(next);
    return;
  }
  let idx = state.currentTrackIdx;
  if (idx < 0) idx = state.filteredTracks.length;
  idx = (idx - 1 + state.filteredTracks.length) % state.filteredTracks.length;
  loadRemoteTrack(state.filteredTracks[idx]);
}

el.prevBtn.addEventListener('click', playPrev);
el.nextBtn.addEventListener('click', playNext);

el.audio.addEventListener('ended', () => {
  if (state.autoplayOn && state.currentTrack && state.filteredTracks.length > 0) {
    playNext();
  }
});

function highlightPlayingRow() {
  const rows = el.tracksList.querySelectorAll('.track-row');
  rows.forEach(r => {
    r.classList.toggle('playing', state.currentTrack && r.dataset.id === state.currentTrack.id);
  });
}

// ==========================================================
//                    TAG PARSERS
// ==========================================================
function parseTags(buffer) {
  const bytes = new Uint8Array(buffer);
  const td = new TextDecoder('utf-8');
  const m4 = td.decode(bytes.slice(0, 4));
  const m3 = td.decode(bytes.slice(0, 3));
  if (m4 === 'fLaC') return parseFLAC(buffer);
  if (m3 === 'ID3') return parseMP3(buffer);
  if (bytes.length > 12 && td.decode(bytes.slice(4, 8)) === 'ftyp') return parseMP4(buffer);
  if (m4 === 'OggS') return parseOGG(buffer);
  return { tags: {}, type: 'unknown', picture: null };
}

function parseFLAC(buffer) {
  const view = new DataView(buffer);
  const bytes = new Uint8Array(buffer);
  const td = new TextDecoder('utf-8');
  const tags = {}; let picture = null;
  let offset = 4, safety = 0;
  while (offset < view.byteLength && safety++ < 1000) {
    const header = view.getUint8(offset);
    const isLast = (header & 0x80) !== 0;
    const blockType = header & 0x7F;
    const blockSize = (view.getUint8(offset + 1) << 16) | (view.getUint8(offset + 2) << 8) | view.getUint8(offset + 3);
    offset += 4;
    if (offset + blockSize > view.byteLength) break;
    if (blockType === 4) {
      let p = offset;
      const vendorLen = view.getUint32(p, true); p += 4; p += vendorLen;
      const n = view.getUint32(p, true); p += 4;
      for (let i = 0; i < n; i++) {
        const len = view.getUint32(p, true); p += 4;
        const entry = td.decode(bytes.slice(p, p + len)); p += len;
        const eq = entry.indexOf('=');
        if (eq > 0) appendTag(tags, entry.substring(0, eq).toLowerCase(), entry.substring(eq + 1));
      }
    } else if (blockType === 6) {
      let p = offset; p += 4;
      const mimeLen = view.getUint32(p, false); p += 4;
      const mime = td.decode(bytes.slice(p, p + mimeLen)); p += mimeLen;
      const descLen = view.getUint32(p, false); p += 4;
      p += descLen; p += 16;
      const dataLen = view.getUint32(p, false); p += 4;
      picture = { mime, data: bytes.slice(p, p + dataLen) };
    }
    offset += blockSize;
    if (isLast) break;
  }
  return { tags, picture, type: 'FLAC' };
}

function parseMP3(buffer) {
  const view = new DataView(buffer);
  const bytes = new Uint8Array(buffer);
  const td = new TextDecoder('utf-8');
  const tags = {}; let picture = null;
  if (td.decode(bytes.slice(0, 3)) !== 'ID3') return { tags, type: 'MP3', picture };
  const mv = view.getUint8(3);
  const flg = view.getUint8(5);
  const tagSize = syncsafe(view, 6);
  let offset = 10;
  if ((flg & 0x40) !== 0) {
    const ext = mv >= 4 ? syncsafe(view, offset) : view.getUint32(offset, false);
    offset += ext + 4;
  }
  const end = Math.min(10 + tagSize, view.byteLength);
  const comments = [], uslts = [];
  while (offset < end - 10) {
    const fid = td.decode(bytes.slice(offset, offset + 4));
    if (fid.charCodeAt(0) === 0 || !/^[A-Z0-9]{4}$/.test(fid)) break;
    const fsize = mv >= 4 ? syncsafe(view, offset + 4) : view.getUint32(offset + 4, false);
    const fs = offset + 10;
    if (fs + fsize > view.byteLength) break;
    const fd = bytes.slice(fs, fs + fsize);
    if (fid === 'TIT2') tags.title = decodeID3Text(fd);
    else if (fid === 'TPE1') tags.artist = decodeID3Text(fd);
    else if (fid === 'TALB') tags.album = decodeID3Text(fd);
    else if (fid === 'TYER' || fid === 'TDRC') tags.year = decodeID3Text(fd);
    else if (fid === 'COMM') {
      const enc = fd[0]; const [, t] = splitNullTerm(fd.slice(4), enc);
      if (t) comments.push(t);
    } else if (fid === 'USLT') {
      const enc = fd[0]; const [, t] = splitNullTerm(fd.slice(4), enc);
      if (t) uslts.push(t);
    } else if (fid === 'TXXX') {
      const enc = fd[0]; const [desc, t] = splitNullTerm(fd.slice(1), enc);
      if (desc && /lyric|comment/i.test(desc) && t) comments.push(t);
    } else if (fid === 'APIC') {
      const enc = fd[0]; let p = 1;
      let me = p; while (me < fd.length && fd[me] !== 0) me++;
      const mime = new TextDecoder('iso-8859-1').decode(fd.slice(p, me));
      p = me + 1; p += 1;
      const step = (enc === 1 || enc === 2) ? 2 : 1;
      let de = p;
      while (de < fd.length - step + 1) {
        if (step === 1 && fd[de] === 0) break;
        if (step === 2 && fd[de] === 0 && fd[de + 1] === 0) break;
        de += step;
      }
      p = de + step;
      picture = { mime: mime || 'image/jpeg', data: fd.slice(p) };
    }
    offset = fs + fsize;
  }
  if (comments.length) tags.comment = comments.join('\n\n');
  if (uslts.length) tags.lyrics = uslts.join('\n\n');
  return { tags, picture, type: 'MP3' };
}

function syncsafe(view, o) {
  return (view.getUint8(o) << 21) | (view.getUint8(o + 1) << 14) | (view.getUint8(o + 2) << 7) | view.getUint8(o + 3);
}

  return decodeByEncoding(fd.slice(1), fd[0]).replace(/\0+$/, '');
}
function decodeByEncoding(b, e) {
  try {
    switch (e) {
      case 0: return new TextDecoder('iso-8859-1').decode(b);
      case 1:
        if (b.length >= 2 && b[0] === 0xFF && b[1] === 0xFE) return new TextDecoder('utf-16le').decode(b.slice(2));
        if (b.length >= 2 && b[0] === 0xFE && b[1] === 0xFF) return new TextDecoder('utf-16be').decode(b.slice(2));
        return new TextDecoder('utf-16le').decode(b);
      case 2: return new TextDecoder('utf-16be').decode(b);
      case 3: return new TextDecoder('utf-8').decode(b);
      default: return new TextDecoder('utf-8').decode(b);
    }
  } catch { return ''; }
}
function splitNullTerm(b, e) {
  const step = (e === 1 || e === 2) ? 2 : 1;
  let i = 0;
  while (i < b.length - step + 1) {
    if (step === 1 && b[i] === 0) break;
    if (step === 2 && b[i] === 0 && b[i + 1] === 0) break;
    i += step;
  }
  return [decodeByEncoding(b.slice(0, i), e), decodeByEncoding(b.slice(i + step), e).replace(/\0+$/, '')];

function parseMP4(buffer) {
  const view = new DataView(buffer);
  const bytes = new Uint8Array(buffer);
  const td = new TextDecoder('utf-8');
  const tdL = new TextDecoder('iso-8859-1');
  const tags = {}; let picture = null;

  function readAtoms(start, end) {
    const atoms = []; let p = start;
    while (p < end - 8) {
      let size = view.getUint32(p, false);
      const type = tdL.decode(bytes.slice(p + 4, p + 8));
      let hs = 8;
      if (size === 1) {
        size = view.getUint32(p + 8, false) * 0x100000000 + view.getUint32(p + 12, false);
        hs = 16;
      } else if (size === 0) size = end - p;
      if (size < hs) break;
      atoms.push({ type, start: p, size, dataStart: p + hs, dataEnd: Math.min(p + size, end) });
      p += size;
    }
    return atoms;
  }

  const top = readAtoms(0, view.byteLength);
  const moov = top.find(a => a.type === 'moov');
  if (!moov) return { tags, type: 'MP4', picture };
  const moovKids = readAtoms(moov.dataStart, moov.dataEnd);
  const udta = moovKids.find(a => a.type === 'udta');
  if (!udta) return { tags, type: 'MP4', picture };
  const udtaKids = readAtoms(udta.dataStart, udta.dataEnd);
  const meta = udtaKids.find(a => a.type === 'meta');
  if (!meta) return { tags, type: 'MP4', picture };
  const metaKids = readAtoms(meta.dataStart + 4, meta.dataEnd);
  const ilst = metaKids.find(a => a.type === 'ilst');
  if (!ilst) return { tags, type: 'MP4', picture };
  const items = readAtoms(ilst.dataStart, ilst.dataEnd);
  for (const item of items) {
    const kids = readAtoms(item.dataStart, item.dataEnd);
    const dataAtom = kids.find(a => a.type === 'data');
    if (!dataAtom) continue;
    const tf = view.getUint32(dataAtom.dataStart, false);
    const payload = bytes.slice(dataAtom.dataStart + 8, dataAtom.dataEnd);
    switch (item.type) {
      case '\u00A9nam': tags.title = td.decode(payload); break;
      case '\u00A9ART': tags.artist = td.decode(payload); break;
      case '\u00A9alb': tags.album = td.decode(payload); break;
      case '\u00A9day': tags.year = td.decode(payload); break;
      case '\u00A9cmt': tags.comment = td.decode(payload); break;
      case '\u00A9lyr': tags.lyrics = td.decode(payload); break;
      case 'covr': {
        const sub = tf & 0xFF;
        picture = { mime: sub === 14 ? 'image/png' : 'image/jpeg', data: payload };
        break;
      }
    }
  }
  return { tags, type: 'MP4', picture };
}

function parseOGG(buffer) {
  const bytes = new Uint8Array(buffer);
  const td = new TextDecoder('utf-8');
  const tags = {};
  const needle = [0x03, 0x76, 0x6f, 0x72, 0x62, 0x69, 0x73];
  let start = -1;
  for (let i = 0; i < bytes.length - 7; i++) {
    let m = true;
    for (let j = 0; j < 7; j++) if (bytes[i + j] !== needle[j]) { m = false; break; }
    if (m) { start = i + 7; break; }
  }
  if (start < 0) return { tags, type: 'OGG', picture: null };
  try {
    const view = new DataView(buffer);
    let p = start;
    const vl = view.getUint32(p, true); p += 4; p += vl;
    const n = view.getUint32(p, true); p += 4;
    for (let i = 0; i < n; i++) {
      const len = view.getUint32(p, true); p += 4;
      const entry = td.decode(bytes.slice(p, p + len)); p += len;
      const eq = entry.indexOf('=');
      if (eq > 0) appendTag(tags, entry.substring(0, eq).toLowerCase(), entry.substring(eq + 1));
    }
  } catch (e) { console.warn(e); }
  return { tags, type: 'OGG', picture: null };
}

function appendTag(tags, key, value) {
  if (tags[key] === undefined) tags[key] = value;
  else if (Array.isArray(tags[key])) tags[key].push(value);
  else tags[key] = [tags[key], value];
}

// ===== Adaptive colors from cover art =====
// Samples the center band of the cover (where text sits), computes luminance,
// and overrides base CSS vars so the ENTIRE UI adapts (text, surfaces, shadows).
function applyAdaptiveColors(imgUrl) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const W = 32, H = 32;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0, W, H);

      // Sample only the central horizontal band (rows 8..24) — that's where bubble text sits
      const data = ctx.getImageData(0, 8, W, 16).data;

      let totalLum = 0, count = 0;
      let rSum = 0, gSum = 0, bSum = 0;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        rSum += r; gSum += g; bSum += b;
        totalLum += (0.299 * r + 0.587 * g + 0.114 * b);
        count++;
      }
      const avgLum = totalLum / count; // 0..255
      const avgR = Math.round(rSum / count);
      const avgG = Math.round(gSum / count);
      const avgB = Math.round(bSum / count);

      // Hysteresis: avoid flicker on borderline covers
      const wasLight = state.adaptiveIsLight === true;
      const wasDark = state.adaptiveIsLight === false;
      let isLight;
      if (wasLight) isLight = avgLum > 130;        // stay light unless clearly dark
      else if (wasDark) isLight = avgLum > 160;    // stay dark unless clearly light
      else isLight = avgLum > 145;                 // first time

      state.adaptiveIsLight = isLight;
      applyAdaptivePalette(isLight, avgR, avgG, avgB);
    } catch (err) {
      console.warn('Adaptive color failed:', err);
      clearAdaptivePalette();
    }
  };
  img.onerror = () => clearAdaptivePalette();
  img.src = imgUrl;
}

function applyAdaptivePalette(isLight, r, g, b) {
  const root = document.documentElement.style;

  if (isLight) {
    // Cover is light → dark text + white halo + translucent white surfaces
    root.setProperty('--text', '#0a0a0a');
    root.setProperty('--text-2', '#1c1c1c');
    root.setProperty('--text-3', '#454545');
    root.setProperty('--text-ghost', 'rgba(0,0,0,0.42)');
    root.setProperty('--text-shadow-soft', '0 1px 2px rgba(255,255,255,0.95), 0 0 14px rgba(255,255,255,0.85)');
    root.setProperty('--text-shadow-active', '0 1px 3px rgba(255,255,255,1), 0 0 22px rgba(255,255,255,0.95)');
    root.setProperty('--surface', 'rgba(255,255,255,0.55)');
    root.setProperty('--surface-elevated', 'rgba(255,255,255,0.92)');
    root.setProperty('--border', 'rgba(0,0,0,0.10)');
    root.setProperty('--border-strong', 'rgba(0,0,0,0.18)');
    root.setProperty('--seek-bg', 'rgba(0,0,0,0.20)');
    root.setProperty('--col-overlay-active', 'rgba(255,255,255,0.12)');
  } else {
    // Cover is dark → light text + black halo + translucent dark surfaces
    root.setProperty('--text', '#ffffff');
    root.setProperty('--text-2', '#e8e8ec');
    root.setProperty('--text-3', '#b0b0b6');
    root.setProperty('--text-ghost', 'rgba(255,255,255,0.42)');
    root.setProperty('--text-shadow-soft', '0 1px 2px rgba(0,0,0,0.9), 0 0 18px rgba(0,0,0,0.7)');
    root.setProperty('--text-shadow-active', '0 2px 5px rgba(0,0,0,0.95), 0 0 28px rgba(0,0,0,0.85)');
    root.setProperty('--surface', 'rgba(20,20,24,0.55)');
    root.setProperty('--surface-elevated', 'rgba(28,28,34,0.92)');
    root.setProperty('--border', 'rgba(255,255,255,0.10)');
    root.setProperty('--border-strong', 'rgba(255,255,255,0.20)');
    root.setProperty('--seek-bg', 'rgba(255,255,255,0.25)');
    root.setProperty('--col-overlay-active', 'rgba(8,8,12,0.10)');
  }

  // iOS Safari status bar color = derived from cover average
  const themeColor = isLight
    ? `rgb(${Math.min(255, r + 20)},${Math.min(255, g + 20)},${Math.min(255, b + 20)})`
    : `rgb(${Math.max(0, r - 30)},${Math.max(0, g - 30)},${Math.max(0, b - 30)})`;
  const meta = document.getElementById('theme-color-meta');
  if (meta) meta.setAttribute('content', themeColor);
}

function clearAdaptivePalette() {
  state.adaptiveIsLight = null;
  const root = document.documentElement.style;
  ['--text','--text-2','--text-3','--text-ghost',
   '--text-shadow-soft','--text-shadow-active',
   '--surface','--surface-elevated','--border','--border-strong',
   '--seek-bg','--col-overlay-active'].forEach(p => root.removeProperty(p));
  const meta = document.getElementById('theme-color-meta');
  if (meta) meta.setAttribute('content', '#0b0b0d');
}
function extractLyrics(r) {
  const t = r.tags || {};
  const cand = [];
  const c = v => {
    if (!v) return;
    if (Array.isArray(v)) v.forEach(c);
    else if (typeof v === 'string' && v.trim()) cand.push(v);
  };
  ['lyrics', 'unsyncedlyrics', 'lyrics_synced', 'lrc', 'comment', 'comments'].forEach(k => c(t[k]));
  for (const [k, v] of Object.entries(t)) if (/lyric|lrc/i.test(k)) c(v);
  const u = [...new Set(cand)];
  return u.find(x => /\[\d{1,2}:\d{2}/.test(x)) || u[0] || null;
}

function extractArt(r) {
  if (!r.picture || !r.picture.data) return null;
  const blob = new Blob([r.picture.data], { type: r.picture.mime || 'image/jpeg' });
  return URL.createObjectURL(blob);
}

function firstOf(v) { return Array.isArray(v) ? v[0] : v; }

let currentArtUrl = null;

function renderTrack(result, meta) {
  const tags = result.tags || {};
  const title = firstOf(tags.title) || (meta.name || '').replace(/\.[^.]+$/, '');
  const artist = firstOf(tags.artist) || '—';
  const album = firstOf(tags.album) || '';

  el.miniTitle.textContent = title;
  el.miniArtist.textContent = album ? `${artist} · ${album}` : artist;

  if (currentArtUrl) { URL.revokeObjectURL(currentArtUrl); currentArtUrl = null; }

  const artUrl = extractArt(result);
  if (artUrl) {
    currentArtUrl = artUrl;
    // Pre-load image for smooth transition
    const img = new Image();
    img.onload = () => {
      el.miniArt.innerHTML = `<img src="${artUrl}" alt="">`;
      el.bgCover.style.backgroundImage = `url("${artUrl}")`;
      el.bgCover.classList.add('active');
      el.bgGradient.classList.add('hidden');
      el.columnBg.classList.add('active');
      // Adaptive text colors based on actual cover luminance
      applyAdaptiveColors(artUrl);
    };
    img.onerror = () => {
      el.miniArt.innerHTML = '<div class="placeholder">♪</div>';
      clearAdaptivePalette();
    };
    img.src = artUrl;
  } else {
    el.miniArt.innerHTML = '<div class="placeholder">♪</div>';
    el.bgCover.classList.remove('active');
    el.bgGradient.classList.remove('hidden');
    el.columnBg.classList.remove('active');
    // No cover → fall back to theme colors
    clearAdaptivePalette();
  }

  // Update iOS / Android system media controls (Control Center, lock screen, notifications).
  updateMediaSession({ title, artist, album, artUrl, mime: result.picture?.mime });

  renderLyrics(extractLyrics(result));
}

// Media Session API — exposes track metadata to OS-level controls
// (iOS Control Center, Android media notifications, MacOS Now Playing).
function updateMediaSession({ title, artist, album, artUrl, mime }) {
  if (!('mediaSession' in navigator)) return;
  try {
    const artwork = [];
    if (artUrl) {
      const sizes = ['96x96', '192x192', '256x256', '384x384', '512x512'];
      for (const s of sizes) {
        artwork.push({ src: artUrl, sizes: s, type: mime || 'image/jpeg' });
      }
    }
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title || '',
      artist: artist || '',
      album: album || '',
      artwork,
    });
    // Always: play / pause
    navigator.mediaSession.setActionHandler('play', () => el.audio.play().catch(()=>{}));
    navigator.mediaSession.setActionHandler('pause', () => el.audio.pause());

    // Library track → prev/next track buttons. Drag-n-drop file → ±10s seek buttons.
    // iOS chooses which to show based on which handlers are registered.
    const isLibraryMode = !!state.currentTrack;
    if (isLibraryMode) {
      navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
      navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
      // Disable seek-by-time so iOS shows track skip instead of ±10s
      navigator.mediaSession.setActionHandler('seekbackward', null);
      navigator.mediaSession.setActionHandler('seekforward', null);
    } else {
      // Drag-n-drop: no other tracks available, so show ±10s seek buttons
      navigator.mediaSession.setActionHandler('previoustrack', null);
      navigator.mediaSession.setActionHandler('nexttrack', null);
      navigator.mediaSession.setActionHandler('seekbackward', (details) => {
        const skip = details.seekOffset || 10;
        el.audio.currentTime = Math.max(0, el.audio.currentTime - skip);
      });
      navigator.mediaSession.setActionHandler('seekforward', (details) => {
        const skip = details.seekOffset || 10;
        el.audio.currentTime = Math.min(el.audio.duration || 0, el.audio.currentTime + skip);
      });
    }
    // Seek bar scrubbing — works in both modes
    navigator.mediaSession.setActionHandler('seekto', (details) => {
      if (details.fastSeek && 'fastSeek' in el.audio) {
        el.audio.fastSeek(details.seekTime);
      } else {
        el.audio.currentTime = details.seekTime;
      }
    });
  } catch (e) {
    console.warn('Media Session update failed:', e);
  }
}

function isLRCFormat(t) { return /^\s*\[\d{1,2}:\d{2}/m.test(t); }

function parseLRC(text) {
  const lines = text.split(/\r?\n/);
  const out = [];
  const re = /\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g;

  // Look for [offset:N] tag — milliseconds shift applied to all timestamps.
  // Positive = lyrics appear later, negative = earlier.
  let offsetSec = 0;
  for (const line of lines) {
    const m = line.match(/^\s*\[offset:\s*([+-]?\d+)\s*\]/i);
    if (m) {
      offsetSec = parseInt(m[1], 10) / 1000;
      break;
    }
  }

  for (const line of lines) {
    if (/^\s*\[(ar|ti|al|au|by|offset|length|re|ve):/i.test(line)) continue;
    const matches = [...line.matchAll(re)];
    if (matches.length === 0) continue;
    const txt = line.replace(re, '').trim();
    for (const m of matches) {
      const min = parseInt(m[1], 10);
      const sec = parseInt(m[2], 10);
      const fr = m[3] || '0';
      const ms = parseInt(fr.padEnd(3, '0').slice(0, 3), 10);
      out.push({ time: min * 60 + sec + ms / 1000 + offsetSec, text: txt });
    }
  }
  return out.sort((a, b) => a.time - b.time);
}

function renderLyrics(raw) {
  el.lyrics.innerHTML = '';
  el.lyrics.classList.remove('plain');
  state.lines = [];
  state.currentIdx = -1;
  state.isLRC = false;
  state.scrollAnimToken = (state.scrollAnimToken || 0) + 1;

  if (!raw || !raw.trim()) {
    el.lyrics.innerHTML = '<div class="no-lyrics"><div class="no-lyrics-title">tacet</div><div class="no-lyrics-sub">у тегах нема тексту</div></div>';
    forceScrollTop();
    return;
  }

  if (isLRCFormat(raw)) {
    state.isLRC = true;
    state.lines = parseLRC(raw);
    if (state.lines.length === 0) return renderPlain(raw);
    const frag = document.createDocumentFragment();
    state.lines.forEach((ln, idx) => {
      const d = document.createElement('div');
      d.className = 'lyric-line future' + (ln.text.trim() === '' ? ' empty' : '');
      d.textContent = ln.text || '';
      d.setAttribute('data-text', ln.text || '');
      d.dataset.idx = idx;
      d.addEventListener('click', () => seekToLyric(Math.max(0, ln.time - LYRIC_LOOKAHEAD_SEC)));
      frag.appendChild(d);
    });
    el.lyrics.appendChild(frag);
  } else {
    renderPlain(raw);
    return;
  }
  // Force scroll-to-top AFTER content is added (iOS scroll anchoring fix)
  forceScrollTop();
}

// Defeats iOS Safari's scroll anchoring by hammering scrollTop=0 across multiple frames.
// Single scrollTop=0 doesn't survive iOS's auto-restore after DOM mutations.
function forceScrollTop() {
  const c = el.lyrics;
  c.style.scrollBehavior = 'auto';
  c.scrollTop = 0;
  // First frame after layout
  requestAnimationFrame(() => {
    c.scrollTop = 0;
    // Second frame, after iOS may have tried to restore position
    requestAnimationFrame(() => {
      c.scrollTop = 0;
      c.style.scrollBehavior = '';
    });
  });
}

function renderPlain(raw) {
  state.isLRC = false;
  el.lyrics.classList.add('plain');
  const frag = document.createDocumentFragment();
  raw.split(/\r?\n/).forEach(text => {
    const d = document.createElement('div');
    d.className = 'lyric-line' + (text.trim() === '' ? ' empty' : '');
    d.textContent = text || '\u00A0';
    frag.appendChild(d);
  });
  el.lyrics.appendChild(frag);
  forceScrollTop();
}

function smoothScrollTo(container, target, duration) {
  const start = container.scrollTop;
  const distance = target - start;
  if (Math.abs(distance) < 2) return;
  const startTime = performance.now();
  // Cancel any in-flight scroll animation by incrementing the token
  state.scrollAnimToken++;
  const myToken = state.scrollAnimToken;
  function step(now) {
    if (myToken !== state.scrollAnimToken) return; // superseded by a newer animation
    const t = Math.min(1, (now - startTime) / duration);
    // Cubic ease in-out
    const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    container.scrollTop = start + distance * eased;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Seek audio and resume play. Wraps the race with timeupdate by suppressing sync
// briefly during the seek operation, so updateActiveLyric doesn't fire on stale time.
function seekToLyric(time) {
  state.suppressSync = true;
  const wasPlaying = !el.audio.paused;
  try { el.audio.currentTime = time; } catch {}
  // After seek completes, resume + re-enable sync. Use seeked event for accuracy on iOS.
  const onSeeked = () => {
    el.audio.removeEventListener('seeked', onSeeked);
    state.suppressSync = false;
    if (wasPlaying || el.audio.paused) {
      el.audio.play().catch(() => {});
    }
    // Force immediate update so the clicked line lights up without 250ms timeupdate delay
    state.currentIdx = -1; // invalidate so next call re-applies classes
    updateActiveLyric();
  };
  el.audio.addEventListener('seeked', onSeeked, { once: true });
  // Safety net if seeked never fires (e.g. already at that time)
  setTimeout(() => {
    el.audio.removeEventListener('seeked', onSeeked);
    state.suppressSync = false;
    updateActiveLyric();
  }, 500);
}

// Lookahead: highlight lines slightly BEFORE they're sung, like Apple Music.
// Most LRC files are written tight to the vocal — this small forward shift makes
// reading easier and compensates for browser audio buffer latency.
const LYRIC_LOOKAHEAD_SEC = 0.5;

function updateActiveLyric() {
  // Don't sync while a track switch is in progress — prevents iOS jump-to-bottom
  if (state.suppressSync) return;
  if (!state.isLRC || state.lines.length === 0) return;
  const t = el.audio.currentTime + LYRIC_LOOKAHEAD_SEC;
  let idx = -1;
  for (let i = 0; i < state.lines.length; i++) {
    if (state.lines[i].time <= t) idx = i; else break;
  }
  if (idx === state.currentIdx) return;
  state.currentIdx = idx;
  const nodes = el.lyrics.querySelectorAll('.lyric-line');
  nodes.forEach((n, i) => {
    n.classList.remove('past', 'active', 'future');
    if (i < idx) n.classList.add('past');
    else if (i === idx) n.classList.add('active');
    else n.classList.add('future');
  });
  const active = nodes[idx];
  if (active) {
    const c = el.lyrics;
    const target = active.offsetTop - c.clientHeight / 2 + active.offsetHeight / 2;
    smoothScrollTo(c, target, 600);
  }
}

// timeupdate is throttled by browser (4-8Hz on iOS) — too slow for accurate lyric sync.
// Use it only for time display + seek progress; lyric sync runs in dedicated rAF loop.
el.audio.addEventListener('timeupdate', () => {
  const cur = el.audio.currentTime;
  const dur = el.audio.duration || 1;
  el.timeCurrent.textContent = formatTime(cur);
  el.seekProgress.style.width = `${(cur / dur) * 100}%`;
});

// Run lyric sync at full frame rate (60-120Hz) while audio is playing.
let _syncLoopId = null;
function startSyncLoop() {
  stopSyncLoop();
  const tick = () => {
    if (el.audio.paused) { _syncLoopId = null; return; }
    updateActiveLyric();
    _syncLoopId = requestAnimationFrame(tick);
  };
  _syncLoopId = requestAnimationFrame(tick);
}
function stopSyncLoop() {
  if (_syncLoopId !== null) {
    cancelAnimationFrame(_syncLoopId);
    _syncLoopId = null;
  }
}

el.seek.addEventListener('click', e => {
  const r = el.seek.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  if (isFinite(el.audio.duration)) {
    seekToLyric(ratio * el.audio.duration);
  }
});

function showPlayer() {
  el.dropzone.style.display = 'none';
  el.playerView.classList.add('active');
}

function formatTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

let toastTimer;
function toast(msg, isError) {
  el.toast.textContent = msg;
  el.toast.classList.toggle('error', !!isError);
  el.toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.toast.classList.remove('show'), 3000);
}

document.addEventListener('keydown', e => {
  const inField = ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName);
  if (e.key === 'Escape') closeAdminModal();
  if (inField) return;
  if (e.code === 'Space' && el.playerView.classList.contains('active')) {
    e.preventDefault();
    el.playBtn.click();
  } else if (e.code === 'ArrowRight' && state.currentTrack) {
    e.preventDefault(); playNext();
  } else if (e.code === 'ArrowLeft' && state.currentTrack) {
    e.preventDefault(); playPrev();
  }
});

// ==========================================================
//                    ADMIN MODAL
// ==========================================================
function openAdminModal() {
  el.adminModal.classList.add('active');
  try { state.adminToken = localStorage.getItem('adminToken'); } catch {}
  if (state.adminToken) {
    showTracksView();
    loadTracks();
  } else {
    showLoginView();
    setTimeout(() => el.adminPassword.focus(), 100);
  }
}
function closeAdminModal() {
  el.adminModal.classList.remove('active');
  el.adminPassword.value = '';
}
function showLoginView() {
  el.adminLogin.style.display = 'block';
  el.adminTracks.style.display = 'none';
  el.adminTitle.textContent = 'library';
}
function showTracksView() {
  el.adminLogin.style.display = 'none';
  el.adminTracks.style.display = 'flex';
  el.adminTitle.textContent = 'library';
}

el.adminBtn.addEventListener('click', openAdminModal);
el.adminClose.addEventListener('click', closeAdminModal);
el.adminModal.addEventListener('click', e => {
  if (e.target === el.adminModal) closeAdminModal();
});
el.adminPassword.addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});
el.adminSubmit.addEventListener('click', adminLogin);

async function adminLogin() {
  const password = el.adminPassword.value;
  if (!password) return;
  el.adminSubmit.disabled = true;
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    if (resp.status === 401) { toast('Невірний пароль', true); return; }
    if (!resp.ok) { toast('Помилка: ' + resp.status, true); return; }
    const data = await resp.json();
    state.adminToken = data.token;
    try { localStorage.setItem('adminToken', data.token); } catch {}
    el.adminPassword.value = '';
    showTracksView();
    loadTracks();
  } catch (err) {
    toast('Мережа недоступна', true);
  } finally {
    el.adminSubmit.disabled = false;
  }
}

async function loadTracks() {
  el.tracksList.innerHTML = '<div class="tracks-empty">Завантаження...</div>';
  try {
    const resp = await fetch('/api/tracks', {
      headers: { 'Authorization': 'Bearer ' + state.adminToken },
    });
    if (resp.status === 401) {
      state.adminToken = null;
      try { localStorage.removeItem('adminToken'); } catch {}
      showLoginView();
      setTimeout(() => el.adminPassword.focus(), 100);
      return;
    }
    if (!resp.ok) { el.tracksList.innerHTML = '<div class="tracks-empty">Помилка: ' + resp.status + '</div>'; return; }
    state.allTracks = await resp.json();
    state.filteredTracks = state.allTracks.slice();
    state.shuffleQueue = [];
    renderTracksList(state.filteredTracks);
    updateNavControls();
  } catch (err) {
    el.tracksList.innerHTML = '<div class="tracks-empty">Мережа недоступна</div>';
  }
}

function renderTracksList(tracks) {
  if (!tracks.length) {
    el.tracksList.innerHTML = '<div class="tracks-empty">Треків нема</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  for (const t of tracks) {
    const row = document.createElement('div');
    row.className = 'track-row';
    if (state.currentTrack && state.currentTrack.id === t.id) row.classList.add('playing');
    row.dataset.id = t.id;
    const name = document.createElement('div');
    name.className = 'track-row-name';
    name.textContent = t.name;
    const size = document.createElement('div');
    size.className = 'track-row-size';
    size.textContent = formatSize(t.size);
    row.appendChild(name);
    row.appendChild(size);
    row.addEventListener('click', () => loadRemoteTrack(t));
    frag.appendChild(row);
  }
  el.tracksList.innerHTML = '';
  el.tracksList.appendChild(frag);
}

function formatSize(b) {
  if (!b) return '';
  if (b < 1024 * 1024) return (b / 1024).toFixed(0) + ' KB';
  return (b / 1024 / 1024).toFixed(1) + ' MB';
}

let searchTimer;
el.adminSearch.addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim().toLowerCase();
  searchTimer = setTimeout(() => {
    if (!q) {
      state.filteredTracks = state.allTracks.slice();
    } else {
      state.filteredTracks = state.allTracks.filter(t => t.name.toLowerCase().includes(q));
    }
    state.shuffleQueue = [];
    if (state.currentTrack) {
      state.currentTrackIdx = state.filteredTracks.findIndex(t => t.id === state.currentTrack.id);
    }
    renderTracksList(state.filteredTracks);
    updateNavControls();
  }, 150);
});

updateNavControls();
</script>
